# Patterns de references produit a NE PAS masquer.
#
# EXEMPLE FICTIF. Adaptez aux formats de references utilises par vos
# fournisseurs pour eviter de masquer par erreur des codes articles.

product_ref_patterns:
  - "[A-Z]{2,4}-[A-Z0-9]{2,8}-\\d{2,4}"   # ex: ABC-DE-032
  - "[A-Z]{3}[A-Z0-9]{3,8}"                # ex: XYZ123
  - "\\d{4}\\s\\d{2}\\s\\d{2}"             # ex: 7828 00 10
